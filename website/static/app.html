<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoodGPT — чат</title>
<link rel="stylesheet" href="/app.css">
</head>
<body>
<div class="orb orb1"></div><div class="orb orb2"></div>

<div id="layout">
  <!-- ===== боковая панель ===== -->
  <aside id="sidebar">
    <div class="side-head">
      <a class="logo" href="/">G</a>
      <div class="brand">GoodGPT</div>
      <button class="iconbtn" id="collapseBtn" title="Скрыть панель">&#9776;</button>
    </div>

    <button class="newchat" id="newChatBtn">&#65291; Новый чат</button>

    <div class="chatlist" id="chatList"></div>

    <div class="side-foot">
      <div class="status" id="status"><span class="dot"></span><span id="statusText">проверка…</span></div>
      <div class="userbox" id="userBox">
        <!-- заполняется js: гость или профиль -->
      </div>
    </div>
  </aside>
  <div id="scrim"></div>

  <!-- ===== основная область ===== -->
  <main id="main">
    <header>
      <button class="iconbtn" id="menuBtn" title="Чаты">&#9776;</button>
      <div class="title" id="chatTitle">Новый чат</div>
      <div class="spacer"></div>
      <button class="iconbtn" id="gearBtn" title="Настройки">&#9881;</button>
    </header>

    <div id="settings">
      <label>API модели <input type="text" id="apiBase"></label>
      <label>Температура <input type="range" id="temp" min="0.1" max="1.5" step="0.05" value="0.8"><span class="val" id="tempVal">0.8</span></label>
      <label>Макс. токенов <input type="range" id="maxTok" min="20" max="600" step="10" value="250"><span class="val" id="maxTokVal">250</span></label>
      <label>Реплик в контексте <input type="range" id="ctxMsgs" min="2" max="12" step="2" value="6"><span class="val" id="ctxMsgsVal">6</span></label>
    </div>

    <div id="chat"><div class="wrap" id="messages"></div></div>

    <footer>
      <div class="suggest" id="suggest"></div>
      <div class="inputrow">
        <textarea id="input" rows="1" placeholder="Напиши сообщение…"></textarea>
        <button id="send" title="Отправить">&#10148;</button>
      </div>
      <div class="hint">Enter — отправить · Shift+Enter — новая строка · модель может ошибаться и фантазировать</div>
    </footer>
  </main>
</div>

<!-- ===== модалка входа ===== -->
<div class="modal-back" id="authModal">
  <div class="modal">
    <button class="modal-x" id="authClose">&#10005;</button>
    <div class="logo big">G</div>
    <h2 id="authTitle">Вход в GoodGPT</h2>
    <p class="modal-sub">Аккаунт хранит историю чатов на сервере — она будет доступна с любого устройства в сети.</p>
    <div class="tabs">
      <button class="tab on" id="tabLogin">Вход</button>
      <button class="tab" id="tabReg">Регистрация</button>
    </div>
    <input type="text" id="authUser" placeholder="Имя пользователя" autocomplete="username">
    <input type="password" id="authPass" placeholder="Пароль" autocomplete="current-password">
    <div class="autherr" id="authErr"></div>
    <button class="btn" id="authSubmit">Войти</button>
    <button class="btn ghost" id="authGuest">Продолжить как гость</button>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
