<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoodGPT — чат</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --panel2: #1c2330;
    --border: #2d3646;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #7c5cff;
    --accent2: #4f8cff;
    --user-bubble: linear-gradient(135deg, #4f8cff, #7c5cff);
    --bot-bubble: #1f2733;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    height: 100vh; display: flex; flex-direction: column;
  }
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 20px; background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  .logo {
    width: 34px; height: 34px; border-radius: 10px;
    background: var(--user-bubble);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 16px; color: #fff;
  }
  header h1 { font-size: 16px; font-weight: 600; }
  header .status { font-size: 12px; color: var(--muted); }
  .status .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #f85149; margin-right: 5px; }
  .status.online .dot { background: #3fb950; }
  header .spacer { flex: 1; }
  .iconbtn {
    background: var(--panel2); color: var(--muted);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 7px 12px; font-size: 13px; cursor: pointer;
  }
  .iconbtn:hover { color: var(--text); border-color: var(--accent); }

  #settings {
    display: none; padding: 12px 20px; background: var(--panel);
    border-bottom: 1px solid var(--border);
    gap: 16px; flex-wrap: wrap; align-items: center;
  }
  #settings.open { display: flex; }
  #settings label { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
  #settings input[type=text] {
    background: var(--panel2); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); padding: 6px 10px; font-size: 13px; width: 280px;
  }
  #settings input[type=range] { accent-color: var(--accent); }
  #settings .val { color: var(--text); min-width: 34px; text-align: right; }

  #chat {
    flex: 1; overflow-y: auto; padding: 24px 0;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 0 20px; }
  .msg { display: flex; margin-bottom: 16px; }
  .msg.user { justify-content: flex-end; }
  .bubble {
    max-width: 78%; padding: 11px 15px; border-radius: 16px;
    font-size: 14.5px; line-height: 1.55; white-space: pre-wrap; word-break: break-word;
  }
  .user .bubble { background: var(--user-bubble); color: #fff; border-bottom-right-radius: 5px; }
  .bot .bubble { background: var(--bot-bubble); border: 1px solid var(--border); border-bottom-left-radius: 5px; }
  .bot .bubble.error { border-color: #f85149; color: #ffa198; }
  .think {
    margin-bottom: 8px; border: 1px solid var(--border); border-radius: 10px;
    background: #12171f; overflow: hidden;
  }
  .think summary {
    cursor: pointer; padding: 7px 12px; font-size: 12.5px; color: var(--accent2);
    user-select: none; list-style: none;
  }
  .think summary::-webkit-details-marker { display: none; }
  .think summary::before { content: "\25B8 "; }
  .think[open] summary::before { content: "\25BE "; }
  .think .think-body {
    padding: 0 12px 10px; font-size: 13px; line-height: 1.5; color: var(--muted);
    white-space: pre-wrap; word-break: break-word;
  }
  .typing { display: inline-flex; gap: 4px; align-items: center; height: 14px; }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%; background: var(--muted);
    animation: blink 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: .25 } 40% { opacity: 1 } }

  .hello {
    text-align: center; color: var(--muted); margin-top: 60px; font-size: 14px;
  }
  .hello .big { font-size: 34px; margin-bottom: 10px; }

  footer {
    padding: 14px 20px 20px; background: linear-gradient(transparent, var(--bg) 30%);
  }
  .inputrow {
    max-width: 760px; margin: 0 auto; display: flex; gap: 10px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 14px; padding: 10px 10px 10px 16px;
  }
  .inputrow:focus-within { border-color: var(--accent); }
  textarea {
    flex: 1; background: transparent; border: none; outline: none; resize: none;
    color: var(--text); font-size: 14.5px; font-family: inherit; line-height: 1.5;
    max-height: 140px;
  }
  #send {
    align-self: flex-end;
    background: var(--user-bubble); color: #fff; border: none;
    border-radius: 10px; padding: 9px 18px; font-size: 14px; font-weight: 600;
    cursor: pointer;
  }
  #send:disabled { opacity: .45; cursor: default; }
  .hint { max-width: 760px; margin: 8px auto 0; font-size: 11.5px; color: var(--muted); text-align: center; }
</style>
</head>
<body>
<header>
  <div class="logo">G</div>
  <div>
    <h1>GoodGPT-01</h1>
    <div class="status" id="status"><span class="dot"></span><span id="statusText">проверка сервера…</span></div>
  </div>
  <div class="spacer"></div>
  <button class="iconbtn" id="clearBtn">Очистить</button>
  <button class="iconbtn" id="gearBtn">Настройки</button>
</header>

<div id="settings">
  <label>API <input type="text" id="apiBase"></label>
  <label>Температура <input type="range" id="temp" min="0.1" max="1.5" step="0.05" value="0.8"><span class="val" id="tempVal">0.8</span></label>
  <label>Макс. токенов <input type="range" id="maxTok" min="20" max="400" step="10" value="200"><span class="val" id="maxTokVal">200</span></label>
</div>

<div id="chat"><div class="wrap" id="messages">
  <div class="hello" id="hello">
    <div class="big">&#128075;</div>
    Это GoodGPT — маленькая модель (33.6M параметров), обученная с нуля.<br>
    Она умеет болтать по-русски, но фактам не верь — сочиняет!
  </div>
</div></div>

<footer>
  <div class="inputrow">
    <textarea id="input" rows="1" placeholder="Напиши сообщение…"></textarea>
    <button id="send">&#10148;</button>
  </div>
  <div class="hint">Enter — отправить, Shift+Enter — новая строка. История диалога держится короткой: у модели контекст всего 512 токенов.</div>
</footer>

<script>
const $ = id => document.getElementById(id);
const defaultApi = `http://${location.hostname || "localhost"}:8000/v1`;
$("apiBase").value = localStorage.getItem("goodgpt_api") || defaultApi;

let history = [];   // {role, content}
let busy = false;

// --- настройки ---
$("gearBtn").onclick = () => $("settings").classList.toggle("open");
$("temp").oninput = e => $("tempVal").textContent = e.target.value;
$("maxTok").oninput = e => $("maxTokVal").textContent = e.target.value;
$("apiBase").onchange = e => localStorage.setItem("goodgpt_api", e.target.value.trim());

// --- статус сервера ---
async function ping() {
  try {
    const r = await fetch($("apiBase").value.replace(/\/$/, "") + "/models");
    const ok = r.ok;
    $("status").classList.toggle("online", ok);
    $("statusText").textContent = ok ? "онлайн" : "сервер отвечает с ошибкой";
  } catch {
    $("status").classList.remove("online");
    $("statusText").textContent = "сервер недоступен — запусти start_server.bat";
  }
}
ping(); setInterval(ping, 10000);

// --- чат ---
function addBubble(role, text, extraClass = "") {
  $("hello")?.remove();
  const m = document.createElement("div");
  m.className = "msg " + role;
  const b = document.createElement("div");
  b.className = ("bubble " + extraClass).trim();
  b.textContent = text;
  m.appendChild(b);
  $("messages").appendChild(m);
  $("chat").scrollTop = $("chat").scrollHeight;
  return b;
}

function setTyping(bubble) {
  bubble.innerHTML = '<span class="typing"><span></span><span></span><span></span></span>';
}

async function send() {
  const text = $("input").value.trim();
  if (!text || busy) return;
  busy = true; $("send").disabled = true;
  $("input").value = ""; autosize();

  addBubble("user", text);
  history.push({ role: "user", content: text });
  // контекст модели маленький — держим только последние 6 реплик
  if (history.length > 6) history = history.slice(-6);

  const bubble = addBubble("bot", "");
  setTyping(bubble);

  // блок «мыслей» появится только если модель их пришлёт (reasoning_content)
  let thinkEl = null, thinkBody = null, reasoning = "";
  function ensureThink() {
    if (thinkEl) return;
    thinkEl = document.createElement("details");
    thinkEl.className = "think";
    thinkEl.open = true;
    const sum = document.createElement("summary");
    sum.textContent = "Размышления";
    thinkBody = document.createElement("div");
    thinkBody.className = "think-body";
    thinkEl.appendChild(sum);
    thinkEl.appendChild(thinkBody);
    bubble.parentNode.insertBefore(thinkEl, bubble);
  }

  const api = $("apiBase").value.replace(/\/$/, "");
  let answer = "";
  try {
    const resp = await fetch(api + "/chat/completions", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "goodgpt-01",
        messages: history,
        temperature: parseFloat($("temp").value),
        max_tokens: parseInt($("maxTok").value),
        stream: true,
      }),
    });
    if (!resp.ok) throw new Error("HTTP " + resp.status);

    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = "";
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const parts = buf.split(/\r?\n\r?\n/);
      buf = parts.pop();
      for (const part of parts) {
        const line = part.trim();
        if (!line.startsWith("data:")) continue;
        const payload = line.slice(5).trim();
        if (payload === "[DONE]") continue;
        try {
          const d = JSON.parse(payload).choices?.[0]?.delta || {};
          if (d.reasoning_content) {
            ensureThink();
            reasoning += d.reasoning_content;
            thinkBody.textContent = reasoning;
            $("chat").scrollTop = $("chat").scrollHeight;
          }
          if (d.content) {
            answer += d.content;
            bubble.textContent = answer;
            $("chat").scrollTop = $("chat").scrollHeight;
          }
        } catch {}
      }
    }
    if (!answer) { answer = "(пустой ответ)"; bubble.textContent = answer; }
    if (thinkEl) { thinkEl.open = false; }  // сворачиваем мысли после ответа
    history.push({ role: "assistant", content: answer });
  } catch (e) {
    bubble.classList.add("error");
    bubble.textContent = "Ошибка: " + e.message + ". Сервер запущен? (start_server.bat)";
    history.pop(); // не сохраняем неудачный ход
  } finally {
    busy = false; $("send").disabled = false; $("input").focus();
  }
}

$("send").onclick = send;
$("input").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});
function autosize() {
  const t = $("input");
  t.style.height = "auto";
  t.style.height = Math.min(t.scrollHeight, 140) + "px";
}
$("input").addEventListener("input", autosize);

$("clearBtn").onclick = () => {
  history = [];
  $("messages").innerHTML = '<div class="hello" id="hello"><div class="big">&#128075;</div>История очищена. Начнём заново!</div>';
};
</script>
</body>
</html>
